name: Deploy Cloud Resume Challenge

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infra/**'
      - 'frontend/**'
      - 'function-app/**'
      - '.github/**'
      # Removed '*.md' - README changes won't trigger any workflow

env:
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  LOCATION: ${{ secrets.LOCATION }}
  STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}
  FUNCTION_APP_NAME: ${{ secrets.FUNCTION_APP_NAME }}
  DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}

jobs:
  terraform:
    name: Provision Azure Resources
    runs-on: ubuntu-latest
    # Simple check: Only run if commit message contains '[tf]'
    # Since workflow only starts for infra/frontend/function-app changes,
    # we can infer infra changes from the workflow trigger
    if: contains(github.event.head_commit.message, '[tf]') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra
        run: |
          terraform plan -out=tfplan \
            -var="resource_group_name=${{ secrets.RESOURCE_GROUP }}" \
            -var="location=${{ secrets.LOCATION }}" \
            -var="storage_account_name=${{ secrets.STORAGE_ACCOUNT_NAME }}" \
            -var="function_app_name=${{ secrets.FUNCTION_APP_NAME }}" \
            -var="cosmos_db_endpoint=${{ secrets.COSMOS_ENDPOINT }}" \
            -var="cosmos_db_key=${{ secrets.COSMOS_KEY }}" \
            -var="database_name=${{ secrets.DATABASE_NAME }}" \
            -var="container_name=${{ secrets.CONTAINER_NAME }}"

      - name: Terraform Apply
        working-directory: ./infra
        run: terraform apply -auto-approve tfplan

  deploy-frontend:
    name: Deploy Static Site
    needs: terraform
    runs-on: ubuntu-latest
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob sync \
              --container '$web' \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --source './frontend/' \
              --delete-destination true

  deploy-function:
    name: Deploy Function
    needs: terraform
    runs-on: ubuntu-latest
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          cd function-app
          pip install -r requirements.txt -t .

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
  
      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: './function-app'