name: Deploy Cloud Resume Challenge

on:
  push:
    branches: [ "main" ]
    paths:
      - 'infra/**'
      - 'frontend/**'
      - 'function-app/**'
      - '.github/**'
      # Note: Removed '*.md' so README changes don't trigger the workflow at all

env:
  # These map to the GitHub Secrets you will create
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  LOCATION: ${{ secrets.LOCATION }}
  STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}
  FUNCTION_APP_NAME: ${{ secrets.FUNCTION_APP_NAME }}
  DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}

jobs:
  # Job 1: Provision Infrastructure with Terraform
  terraform:
    name: Provision Azure Resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 1: Check if 'infra' folder changed in this commit
      - name: Check if Infra Changed
        id: check_infra
        run: |
          # Get the list of changed files compared to the previous commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED_FILES"
          
          # Check if any file starts with 'infra/'
          if echo "$CHANGED_FILES" | grep -q "^infra/"; then
            echo "infra_changed=true" >> $GITHUB_OUTPUT
            echo "::notice::Infra files changed. Proceeding with Terraform."
          else
            echo "infra_changed=false" >> $GITHUB_OUTPUT
            echo "::notice::No infra files changed. Skipping Terraform steps."
          fi

      # Step 2: Login to Azure (Only if infra changed)
      - name: Login to Azure
        if: steps.check_infra.outputs.infra_changed == 'true'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3: Setup Terraform (Only if infra changed)
      - name: Setup Terraform
        if: steps.check_infra.outputs.infra_changed == 'true'
        uses: hashicorp/setup-terraform@v2

      # Step 4: Terraform Init (Only if infra changed)
      - name: Terraform Init
        if: steps.check_infra.outputs.infra_changed == 'true'
        working-directory: ./infra
        run: terraform init

      # Step 5: Terraform Plan (Only if infra changed)
      - name: Terraform Plan
        if: steps.check_infra.outputs.infra_changed == 'true'
        working-directory: ./infra
        run: |
          terraform plan -out=tfplan \
            -var="resource_group_name=${{ env.RESOURCE_GROUP }}" \
            -var="location=${{ env.LOCATION }}" \
            -var="storage_account_name=${{ env.STORAGE_ACCOUNT_NAME }}" \
            -var="function_app_name=${{ env.FUNCTION_APP_NAME }}" \
            -var="cosmos_db_endpoint=${{ secrets.COSMOS_ENDPOINT }}" \
            -var="cosmos_db_key=${{ secrets.COSMOS_KEY }}" \
            -var="database_name=${{ env.DATABASE_NAME }}" \
            -var="container_name=${{ env.CONTAINER_NAME }}"

      # Step 6: Terraform Apply (Only if infra changed)
      - name: Terraform Apply
        if: steps.check_infra.outputs.infra_changed == 'true'
        working-directory: ./infra
        run: terraform apply -auto-approve tfplan

  # Job 2: Deploy Frontend to Storage
  deploy-frontend:
    name: Deploy Static Site
    needs: terraform
    runs-on: ubuntu-latest
    # Run if Terraform succeeded OR was skipped (e.g., only frontend changed)
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob sync \
              --container '$web' \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --source './frontend/' \
              --delete-destination true

  # Job 3: Deploy Function App
  deploy-function:
    name: Deploy Function
    needs: terraform
    runs-on: ubuntu-latest
    # Run if Terraform succeeded OR was skipped
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          cd function-app
          pip install -r requirements.txt -t .

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
  
      - name: Deploy Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: './function-app'